name: Preupload CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Checkout shared security tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aaron-personal-os/agent-stack-shared
          ref: f9e1c43a4a554e0cf296d794f6fcd80d00bc7db3
          path: .security/agent-stack-shared
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Scan repository credentials
        run: |
          python .security/agent-stack-shared/scripts/check_repository_secrets.py --self-test
          python .security/agent-stack-shared/scripts/check_repository_secrets.py --root .

  api-guardrails:
    name: API Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @couple-planet/api build

  ios-dry-run:
    name: iOS Dry Run
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Run TestFlight dry-run script
        run: bash scripts/release/testflight-dry-run.sh

      - name: Upload iOS dry-run report (if generated)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testflight-dry-run-report
          path: docs/release/testflight-dry-run-latest.md
          if-no-files-found: ignore
