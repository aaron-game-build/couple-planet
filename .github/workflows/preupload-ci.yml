name: Preupload CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Checkout shared security tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aaron-personal-os/agent-stack-shared
          ref: f9e1c43a4a554e0cf296d794f6fcd80d00bc7db3
          path: .security/agent-stack-shared
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Scan repository credentials
        run: |
          python .security/agent-stack-shared/scripts/check_repository_secrets.py --self-test
          python .security/agent-stack-shared/scripts/check_repository_secrets.py --root .

  api-guardrails:
    name: API Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @couple-planet/api build

  ios-dry-run:
    name: iOS Dry Run
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Flutter
        shell: bash
        env:
          FLUTTER_RELEASES_URL: https://storage.googleapis.com/flutter_infra_release/releases/releases_macos.json
        run: |
          set -euo pipefail
          releases_json="$RUNNER_TEMP/flutter-releases-macos.json"
          flutter_zip="$RUNNER_TEMP/flutter-sdk.zip"
          flutter_root="$RUNNER_TEMP/flutter-sdk"

          curl --fail --location --silent --show-error \
            "$FLUTTER_RELEASES_URL" \
            --output "$releases_json"

          read -r flutter_archive flutter_sha256 < <(
            python3 - "$releases_json" "${RUNNER_ARCH:-X64}" <<'PY'
          import json
          import pathlib
          import sys

          releases = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          stable_hash = releases["current_release"]["stable"]
          candidates = [
              release
              for release in releases["releases"]
              if release.get("hash") == stable_hash
          ]
          wants_arm64 = sys.argv[2].upper() == "ARM64"
          selected = next(
              (
                  release
                  for release in candidates
                  if ("arm64" in release["archive"].lower()) == wants_arm64
              ),
              None,
          )
          if selected is None:
              raise SystemExit(
                  f"No stable Flutter archive for runner architecture {sys.argv[2]}"
              )
          print(selected["archive"], selected["sha256"])
          PY
          )

          base_url="${FLUTTER_RELEASES_URL%/releases_macos.json}"
          curl --fail --location --silent --show-error \
            "$base_url/$flutter_archive" \
            --output "$flutter_zip"
          printf '%s  %s\n' "$flutter_sha256" "$flutter_zip" | shasum -a 256 --check

          mkdir -p "$flutter_root"
          ditto -x -k "$flutter_zip" "$flutter_root"
          echo "$flutter_root/flutter/bin" >> "$GITHUB_PATH"
          "$flutter_root/flutter/bin/flutter" --version

      - name: Run TestFlight dry-run script
        run: bash scripts/release/testflight-dry-run.sh

      - name: Upload iOS dry-run report (if generated)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testflight-dry-run-report
          path: docs/release/testflight-dry-run-latest.md
          if-no-files-found: ignore
